<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="/static/login.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

    <img src="/static/image/image1.png" alt="Logo" class="logo-image">

    <div class="login-card">
        <h1>Welcome</h1>
        <p id="status">Connecting...</p>
        <p id="debug" style="font-size:11px;color:gray;word-break:break-all;"></p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const debug = document.getElementById("debug");
        const status = document.getElementById("status");

        // initData bormi?
        debug.textContent = "initData length: " + tg.initData.length;

        if (!tg.initData || tg.initData.length === 0) {
            status.textContent = "Please open this app inside Telegram.";
        } else {
            const user = tg.initDataUnsafe.user;
            debug.textContent = "user.id = " + (user ? user.id : "NULL");

            if (!user || !user.id) {
                status.textContent = "Error: user not found.";
            } else {
                status.textContent = "Logging in as: " + user.id;

                fetch("/auth", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ init_data: tg.initData })
                })
                    .then(res => res.json())
                    .then(data => {
                        debug.textContent = "auth response: " + JSON.stringify(data);
                        if (data.ok) {
                            window.location.href = "/tasks?uid=" + user.id;
                        } else {
                            status.textContent = "Auth error: " + data.detail;
                        }
                    })
                    .catch(err => {
                        status.textContent = "Fetch error: " + err;
                    });
            }
        }
    </script>

</body>

</html>
